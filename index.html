<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>حمودي ستوري | Hamoudi Store</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #06060a;
            --bg-primary: #0a0a10;
            --bg-secondary: #10101a;
            --bg-card: #14141f;
            --bg-card-hover: #1a1a28;
            --bg-glass: rgba(20, 20, 35, 0.7);
            --border-subtle: #1e1e30;
            --border-glow: rgba(0, 210, 255, 0.15);
            
            --text-primary: #eaeaef;
            --text-secondary: #9a9ab0;
            --text-muted: #6a6a80;
            
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.4);
            --accent-soft: rgba(0, 212, 255, 0.08);
            --accent-mid: rgba(0, 212, 255, 0.18);
            
            --gold: #f0b90b;
            --gold-glow: rgba(240, 185, 11, 0.35);
            
            --success: #00e676;
            --danger: #ff3d4f;
            --danger-glow: rgba(255, 61, 79, 0.3);
            
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 50%;
            
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
            --shadow-glow: 0 0 30px var(--accent-glow);
            --shadow-gold: 0 0 25px var(--gold-glow);
            
            --font-heading: 'Cairo', 'Tajawal', sans-serif;
            --font-body: 'Tajawal', 'Cairo', sans-serif;
            
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: calc(80px + var(--safe-bottom));
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* خلفية متحركة خفيفة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 10%, rgba(0, 212, 255, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(0, 212, 255, 0.02) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 185, 11, 0.015) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ==================== الهيدر العلوي ==================== */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
