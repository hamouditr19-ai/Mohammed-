<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Hamoudi Story</title>
    <style>
        body { background: #050811; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .product-card { background: #151e33; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #3ae4ff; }
        .btn { background: #3ae4ff; color: #000; padding: 12px; border-radius: 10px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>منتجات المتجر</h1>
    <div id="shop">جاري تحميل المنتجات...</div>

    <script>
        async function getProducts() {
            const container = document.getElementById('shop');
            // استخدمت رابط وسيط آخر أكثر استقراراً
            const url = "https://api.codetabs.com/v1/proxy?quest=https://store.ahminix.com/client/api/products";
            
            try {
                const response = await fetch(url, {
                    headers: { 'api-token': 'KYQNQBmUT8mAvaTIZPXGalM-AXEeNwHASz8OVj6DBMiuJzFqxZKdVy9oaeeSOCaX' }
                });
                const products = await response.json();
                
                container.innerHTML = "";
                products.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <h3>${p.name}</h3>
                            <p>السعر: ${p.price} $</p>
                            <button class="btn" onclick="alert('شراء ${p.name}')">شراء</button>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = "حدث خطأ. تأكد من اتصال الإنترنت وحاول تحديث الصفحة.";
            }
        }
        getProducts();
    </script>
</body>
</html>
